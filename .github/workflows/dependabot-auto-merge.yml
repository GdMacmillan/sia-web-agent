name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v7

      - name: Decide eligibility
        id: gate
        env:
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          ECOSYSTEM: ${{ steps.meta.outputs.package-ecosystem }}
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
        run: |
          set -euo pipefail
          case "$UPDATE_TYPE" in
            version-update:semver-patch|version-update:semver-minor) ;;
            *) echo "eligible=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac

          case "$ECOSYSTEM" in
            github_actions)
              echo "eligible=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
            npm_and_yarn) ;;
            *) echo "eligible=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac

          # Verify every changed dependency actually lives in devDependencies
          # in package.json on this PR's branch, rather than trusting
          # Dependabot's own dependency-type metadata: that field can go
          # stale after a manifest reorganization and doesn't get
          # recomputed by "@dependabot recreate" (observed on the `tsx`
          # dependency, 2026-07-13 — it moved to `dependencies` but
          # Dependabot kept reporting direct:development).
          eligible=true
          IFS=',' read -ra deps <<< "$DEP_NAMES"
          for raw in "${deps[@]}"; do
            dep="$(echo "$raw" | xargs)"
            if ! jq -e --arg d "$dep" '.devDependencies | has($d)' package.json > /dev/null; then
              echo "Not a devDependency (or not found in package.json): $dep"
              eligible=false
              break
            fi
          done
          echo "eligible=$eligible" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.gate.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
